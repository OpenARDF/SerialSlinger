name: jDeploy Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: jdeploy-release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  publish-macos-release:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build jDeploy desktop bundle
        run: ./gradlew prepareDesktopJdeployBundle verifyDesktopJdeployBundle

      - name: Publish with jDeploy
        uses: shannah/jdeploy@master
        with:
          github_token: ${{ github.token }}
