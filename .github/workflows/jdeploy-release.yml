name: jDeploy Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: jdeploy-release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  publish-macos-release:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Temurin JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build jDeploy desktop bundle
        run: ./gradlew prepareDesktopJdeployBundle verifyDesktopJdeployBundle

      - name: Publish with jDeploy
        uses: shannah/jdeploy@master
        with:
          github_token: ${{ github.token }}
          deploy_target: github
          jdeploy_version: "6.1.3"

      - name: Upload canonical npm package tarball
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          npm pack --ignore-scripts
          gh release upload "${{ github.ref_name }}" serialslinger-*.tgz --clobber

      - name: Repair macOS jDeploy branding
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/repair-jdeploy-github-release-macos.sh "${{ github.ref_name }}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ github.ref_name }}" --draft=false
